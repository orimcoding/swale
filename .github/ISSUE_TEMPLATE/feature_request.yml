name: Feature request
description: Suggest something new
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Before submitting, check open issues to make sure this hasn't already been suggested.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem, not the solution. What can't you do today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the feature you want. Be specific.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any other ways you thought about solving this?

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important
        - Blocking my use of Swale
    validations:
      required: true